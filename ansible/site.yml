---
- hosts: web
  become: yes

  tasks:

    - name: Install Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Start Apache
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create homepage
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
          <head>
              <title>DevOps Final Project</title>
          </head>
          <body>
              <h1>Hello from Ansible!</h1>
              <h2>Created by Shlomi</h2>
          </body>
          </html>
